<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Detail — KIB Operations Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="app-layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header"><div style="width:30px;height:30px;background:var(--color-accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:11px">KIB</div><span class="sidebar-title">Ops Portal</span></div>
    <ul class="sidebar-nav">
      <li class="nav-item"><a href="/index.html"><i data-feather="grid"></i> Dashboard</a></li>
      <li class="nav-item active"><a href="/tasks.html"><i data-feather="check-square"></i> Tasks</a></li>
      <li class="nav-item"><a href="/handover.html"><i data-feather="repeat"></i> Handover</a></li>
      <li class="nav-item"><a href="/training.html"><i data-feather="book-open"></i> Training</a></li>
      <li class="nav-item"><a href="/sales.html"><i data-feather="trending-up"></i> Sales</a></li>
      <li class="nav-item"><a href="/notifications.html"><i data-feather="bell"></i> Notifications</a></li>
    </ul>
    <div class="sidebar-footer"><div class="user-avatar" id="avatarInitials">?</div><div class="user-info"><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRole">—</div></div><button class="btn-logout" onclick="AUTH.logout()"><i data-feather="log-out"></i></button></div>
  </nav>

  <main class="main-content">
    <header class="top-bar">
      <button class="sidebar-toggle" id="sidebarToggle"><i data-feather="menu"></i></button>
      <div class="breadcrumb"><a href="/tasks.html">Tasks</a> / <span id="taskIdBreadcrumb">Detail</span></div>
      <div class="top-bar-actions"><button class="notif-bell" id="notifBell" onclick="UI.openNotifDrawer()"><i data-feather="bell"></i><span class="notif-badge hidden" id="notifCount">0</span></button></div>
    </header>

    <div class="page-content">
      <div id="taskDetailContent">
        <div class="empty-state-sm">Loading task...</div>
      </div>
    </div>
  </main>

  <div class="notif-drawer hidden" id="notifDrawer">
    <div class="notif-drawer-header"><h3>Notifications</h3><button onclick="NOTIFICATIONS.markAllRead()">Mark all read</button><button onclick="UI.closeNotifDrawer()">✕</button></div>
    <div class="notif-list" id="notifDrawerList"></div>
  </div>
  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/notifications.js"></script>
  <script>
    AUTH.requireAuth();
    feather.replace();
    UI.setPageUser(AUTH.getSession());
    UI.initSidebarToggle();
    NOTIFICATIONS.startPolling(CONFIG.polling_interval_ms);

    const taskId = new URLSearchParams(window.location.search).get('id');
    if (!taskId) { window.location.href = '/tasks.html'; }
    document.getElementById('taskIdBreadcrumb').textContent = taskId;

    let taskData = null;

    async function loadTask() {
      try {
        const data = await API.get('/api/tasks/detail', { task_id: taskId });
        taskData = data.task;
        renderTask(data.task, data.comments || [], data.activity || []);
      } catch(e) { UI.showEmptyState('taskDetailContent', 'Task not found'); }
    }

    function renderTask(t, comments, activity) {
      const tr = UTILS.timeRemaining(t.due_datetime);
      const session = AUTH.getSession();
      const isAssignee = session.user_id === t.assigned_to_user_id;
      const isManager  = AUTH.hasRole('HoD','Manager');
      const canUpdate  = isAssignee || isManager;

      document.getElementById('taskDetailContent').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 360px;gap:var(--space-6)">

          <!-- Left: Main detail -->
          <div>
            <div class="form-card">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap">
                <div>
                  <div style="display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-2)">
                    <span class="mono text-muted" style="font-size:var(--text-xs)">${t.task_id}</span>
                    <span class="badge ${UTILS.statusBadgeClass(t.status)}">${t.status}</span>
                    <span class="badge badge-gray">${t.priority}</span>
                    ${t.is_overdue === 'TRUE' ? '<span class="badge badge-red">OVERDUE</span>' : ''}
                  </div>
                  <h2 style="font-size:var(--text-xl);font-weight:700;margin-bottom:var(--space-2)">${UTILS.escapeHtml(t.title)}</h2>
                  <p style="color:var(--text-secondary);font-size:var(--text-sm)">${UTILS.escapeHtml(t.description || 'No description provided.')}</p>
                </div>
                ${canUpdate ? `
                  <div style="display:flex;gap:var(--space-2)">
                    ${isManager ? `<button class="btn btn-secondary btn-xs" onclick="cancelTask()">Cancel Task</button>` : ''}
                    <button class="btn btn-primary btn-xs" onclick="showUpdateModal()">Update Status</button>
                  </div>` : ''}
              </div>

              <!-- Progress -->
              <div style="margin-top:var(--space-5)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
                  <span style="font-size:var(--text-sm);font-weight:600">Progress</span>
                  <span style="font-size:var(--text-sm);font-weight:700">${t.progress_percentage || 0}%</span>
                </div>
                <div class="progress-bar-wrap" style="height:10px">
                  <div class="progress-bar-fill" style="width:${t.progress_percentage || 0}%"></div>
                </div>
              </div>
            </div>

            <!-- Comments -->
            <div class="form-card" style="margin-top:var(--space-4)">
              <div class="form-section-title">Comments & Notes</div>
              <div id="commentList" style="margin-bottom:var(--space-4)">
                ${comments.length ? comments.map(c => `
                  <div style="padding:var(--space-3) 0;border-bottom:1px solid var(--color-border)">
                    <div style="display:flex;gap:var(--space-2);align-items:center;margin-bottom:4px">
                      <strong style="font-size:var(--text-sm)">${UTILS.escapeHtml(c.author_name)}</strong>
                      <span class="badge badge-gray">${c.author_role}</span>
                      <span style="font-size:var(--text-xs);color:var(--text-muted)">${UTILS.formatDateTime(c.created_datetime)}</span>
                      ${c.is_manager_note === 'TRUE' ? '<span class="badge badge-purple">Manager Note</span>' : ''}
                    </div>
                    <p style="font-size:var(--text-sm);color:var(--text-secondary)">${UTILS.escapeHtml(c.comment_text)}</p>
                  </div>`).join('') : '<p style="color:var(--text-muted);font-size:var(--text-sm)">No comments yet.</p>'}
              </div>
              <div class="form-group">
                <label>Add Comment</label>
                <textarea id="commentInput" rows="3" placeholder="Write your comment or progress update..."></textarea>
              </div>
              ${isManager ? `
                <div style="margin-bottom:var(--space-3)">
                  <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer;font-size:var(--text-sm)">
                    <input type="checkbox" id="isManagerNote" style="width:14px;height:14px"> Mark as Manager Note (private)
                  </label>
                </div>` : ''}
              <button class="btn btn-primary" onclick="submitComment()"><i data-feather="send"></i> Post Comment</button>
            </div>
          </div>

          <!-- Right: Meta panel -->
          <div>
            <div class="form-card">
              <div class="form-section-title">Task Details</div>
              <table style="width:100%;font-size:var(--text-sm)">
                <tr><td style="padding:5px 0;color:var(--text-muted);width:120px">Category</td><td style="font-weight:600">${t.category}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">Assigned To</td><td style="font-weight:600">${UTILS.escapeHtml(t.assigned_to_name)}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">Assigned By</td><td style="font-weight:600">${UTILS.escapeHtml(t.assigned_by_name)}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">Team</td><td>${t.assigned_to_team || '—'}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">SLA</td><td>${t.sla_label}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">Due</td><td style="font-weight:600;color:${tr.overdue ? 'var(--color-danger)' : ''}">${UTILS.formatDateTime(t.due_datetime)}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">Time Left</td><td class="${tr.overdue ? 'text-danger' : ''}" style="font-weight:600">${tr.label}</td></tr>
                <tr><td style="padding:5px 0;color:var(--text-muted)">Created</td><td>${UTILS.formatDateTime(t.created_datetime)}</td></tr>
                ${t.completed_datetime ? `<tr><td style="padding:5px 0;color:var(--text-muted)">Completed</td><td>${UTILS.formatDateTime(t.completed_datetime)}</td></tr>` : ''}
                ${t.tags ? `<tr><td style="padding:5px 0;color:var(--text-muted)">Tags</td><td style="font-size:var(--text-xs)">${t.tags}</td></tr>` : ''}
              </table>
            </div>

            <!-- Activity timeline -->
            <div class="form-card" style="margin-top:var(--space-4)">
              <div class="form-section-title">Activity Timeline</div>
              ${activity.length ? activity.map(a => `
                <div style="display:flex;gap:var(--space-3);padding:var(--space-2) 0;border-bottom:1px solid var(--color-border)">
                  <div style="width:8px;height:8px;border-radius:50%;background:var(--color-accent);margin-top:5px;flex-shrink:0"></div>
                  <div>
                    <div style="font-size:var(--text-xs);font-weight:600">${UTILS.escapeHtml(a.action_type)}</div>
                    <div style="font-size:var(--text-xs);color:var(--text-muted)">${UTILS.escapeHtml(a.performed_by_name)} · ${UTILS.formatDateTime(a.performed_datetime)}</div>
                    ${a.from_value || a.to_value ? `<div style="font-size:var(--text-xs);color:var(--text-secondary)">${a.from_value || ''} → ${a.to_value || ''}</div>` : ''}
                  </div>
                </div>`).join('') : '<p style="color:var(--text-muted);font-size:var(--text-sm)">No activity yet.</p>'}
            </div>
          </div>
        </div>`;
      feather.replace();
    }

    async function submitComment() {
      const text = document.getElementById('commentInput')?.value?.trim();
      if (!text) { UI.showToast('Please write a comment first', 'warning'); return; }
      const isManagerNote = document.getElementById('isManagerNote')?.checked || false;
      try {
        await API.post('/api/tasks/comment', { task_id: taskId, comment_text: text, is_manager_note: isManagerNote });
        UI.showToast('Comment posted', 'success');
        document.getElementById('commentInput').value = '';
        loadTask();
      } catch(e){}
    }

    function showUpdateModal() {
      const statusOptions = ['InProgress','Pending','WaitingInput','UnderReview','Completed'];
      UI.showModal('Update Task Status',
        `<div class="form-group">
          <label>New Status</label>
          <select id="newStatus">${statusOptions.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
        </div>
        <div class="form-group">
          <label>Progress %</label>
          <input type="number" id="newProgress" min="0" max="100" value="${taskData?.progress_percentage || 0}">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="updateNotes" rows="3" placeholder="Describe what was done..."></textarea>
        </div>`,
        `<button class="btn btn-secondary" onclick="UI.closeModal()">Cancel</button>
         <button class="btn btn-primary" onclick="saveUpdate()">Save Update</button>`);
      feather.replace();
    }

    async function saveUpdate() {
      try {
        await API.post('/api/tasks/update', {
          task_id: taskId,
          status: document.getElementById('newStatus').value,
          progress_percentage: Number(document.getElementById('newProgress').value),
          completion_notes: document.getElementById('updateNotes').value,
        });
        UI.closeModal();
        UI.showToast('Task updated', 'success');
        loadTask();
      } catch(e){}
    }

    async function cancelTask() {
      if (!confirm('Cancel this task? This cannot be undone.')) return;
      try {
        await API.post('/api/tasks/update', { task_id: taskId, status: 'Cancelled', closure_reason: 'Cancelled by manager' });
        UI.showToast('Task cancelled', 'success');
        setTimeout(() => { window.location.href = '/tasks.html'; }, 1500);
      } catch(e){}
    }

    loadTask();
  </script>
</body>
</html>
