<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Training Plan — KIB Operations Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="app-layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header"><div style="width:30px;height:30px;background:var(--color-accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:11px">KIB</div><span class="sidebar-title">Ops Portal</span></div>
    <ul class="sidebar-nav">
      <li class="nav-item"><a href="/index.html"><i data-feather="grid"></i> Dashboard</a></li>
      <li class="nav-item"><a href="/tasks.html"><i data-feather="check-square"></i> Tasks</a></li>
      <li class="nav-item"><a href="/handover.html"><i data-feather="repeat"></i> Handover</a></li>
      <li class="nav-item active"><a href="/training.html"><i data-feather="book-open"></i> Training</a></li>
      <li class="nav-item"><a href="/sales.html"><i data-feather="trending-up"></i> Sales</a></li>
      <li class="nav-item"><a href="/notifications.html"><i data-feather="bell"></i> Notifications</a></li>
    </ul>
    <div class="sidebar-footer"><div class="user-avatar" id="avatarInitials">?</div><div class="user-info"><div class="user-name" id="sidebarName">Loading...</div><div class="user-role" id="sidebarRole">—</div></div><button class="btn-logout" onclick="AUTH.logout()"><i data-feather="log-out"></i></button></div>
  </nav>

  <main class="main-content">
    <header class="top-bar">
      <button class="sidebar-toggle" id="sidebarToggle"><i data-feather="menu"></i></button>
      <div class="breadcrumb"><a href="/training.html">Training</a> / New Plan</div>
      <div class="top-bar-actions"><button class="notif-bell" id="notifBell" onclick="UI.openNotifDrawer()"><i data-feather="bell"></i><span class="notif-badge hidden" id="notifCount">0</span></button></div>
    </header>

    <div class="page-content" style="max-width:800px;margin:0 auto">
      <div class="page-header">
        <div class="page-header-left"><h1 class="page-title">Create Training Plan</h1><p class="page-subtitle">Assign a coaching or training plan to an employee</p></div>
        <div class="page-actions"><a href="/training.html" class="btn btn-secondary"><i data-feather="arrow-left"></i> Cancel</a></div>
      </div>

      <form id="trainingForm" autocomplete="off">
        <div class="form-card">
          <div class="form-section-title">Plan Details</div>
          <div class="form-group"><label>Subject / Topic <span style="color:var(--color-danger)">*</span></label><input type="text" id="trnSubject" name="trnSubject" placeholder="e.g. Personal Finance Product Knowledge" required></div>
          <div class="form-row">
            <div class="form-group">
              <label>Category <span style="color:var(--color-danger)">*</span></label>
              <select id="trnCategory" name="trnCategory" required>
                <option value="">— Select —</option>
                <option value="Product">Product</option>
                <option value="Procedure">Procedure</option>
                <option value="Compliance">Compliance</option>
                <option value="Soft Skills">Soft Skills</option>
                <option value="Systems">Systems</option>
                <option value="Sales Technique">Sales Technique</option>
                <option value="QA">QA</option>
                <option value="General">General</option>
              </select>
            </div>
            <div class="form-group"><label>Target Quantity <span style="color:var(--color-danger)">*</span></label><input type="number" id="trnTargetQty" name="trnTargetQty" min="1" placeholder="e.g. 1000" required></div>
          </div>
          <div class="form-group"><label>Description</label><textarea id="trnDescription" name="trnDescription" rows="3" placeholder="Outline the training objectives and scope..."></textarea></div>
        </div>

        <div class="form-card">
          <div class="form-section-title">People</div>
          <div class="form-row">
            <div class="form-group"><label>Employee (Trainee) <span style="color:var(--color-danger)">*</span></label><select id="trnEmployee" name="trnEmployee" required><option value="">— Select employee —</option></select></div>
            <div class="form-group"><label>Trainer <span style="color:var(--color-danger)">*</span></label><select id="trnTrainer" name="trnTrainer" required><option value="">— Select trainer —</option></select></div>
          </div>
        </div>

        <div class="form-card">
          <div class="form-section-title">Timeline</div>
          <div class="form-row">
            <div class="form-group"><label>Start Date <span style="color:var(--color-danger)">*</span></label><input type="date" id="trnStartDate" name="trnStartDate" required></div>
            <div class="form-group"><label>Target Completion Date <span style="color:var(--color-danger)">*</span></label><input type="date" id="trnTargetDate" name="trnTargetDate" required></div>
          </div>
          <div class="form-group"><label>Next Review Date</label><input type="date" id="trnReviewDate" name="trnReviewDate"></div>
          <div id="planPreview" style="background:var(--color-primary-light);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);color:var(--color-primary);display:none">
            📊 Expected daily rate: <strong id="dailyRatePreview">—</strong> units/day
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:var(--space-3);padding-bottom:var(--space-8)">
          <a href="/training.html" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary" id="btnSubmitPlan"><i data-feather="check"></i> Create Plan</button>
        </div>
      </form>
    </div>
  </main>

  <div class="notif-drawer hidden" id="notifDrawer">
    <div class="notif-drawer-header"><h3>Notifications</h3><button onclick="NOTIFICATIONS.markAllRead()">Mark all read</button><button onclick="UI.closeNotifDrawer()">✕</button></div>
    <div class="notif-list" id="notifDrawerList"></div>
  </div>
  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/components.js"></script>
  <script src="/assets/js/notifications.js"></script>
  <script src="/assets/js/training.js"></script>
  <script>
    feather.replace();
    TRAINING.initForm();
    NOTIFICATIONS.startPolling(CONFIG.polling_interval_ms);

    // Load users for dropdowns
    (async () => {
      try {
        const data = await API.get('/api/users/list');
        const users = (data.users || []).filter(u => u.active_flag !== 'FALSE');
        ['trnEmployee','trnTrainer'].forEach(id => {
          const sel = document.getElementById(id);
          users.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.user_id; opt.textContent = `${u.full_name} (${u.role})`; opt.dataset.name = u.full_name;
            sel.appendChild(opt);
          });
        });
      } catch(e){}
    })();

    // Daily rate preview
    function updateDailyRate() {
      const qty = Number(document.getElementById('trnTargetQty').value);
      const start = document.getElementById('trnStartDate').value;
      const end = document.getElementById('trnTargetDate').value;
      if (!qty || !start || !end) return;
      const days = Math.max(1, Math.ceil((new Date(end) - new Date(start)) / 86400000));
      const rate = (qty / days).toFixed(1);
      document.getElementById('dailyRatePreview').textContent = rate;
      document.getElementById('planPreview').style.display = '';
    }
    ['trnTargetQty','trnStartDate','trnTargetDate'].forEach(id => document.getElementById(id)?.addEventListener('change', updateDailyRate));
  </script>
</body>
</html>
