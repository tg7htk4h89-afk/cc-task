<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — KIB Operations Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-logo">
      <div style="width:60px;height:60px;background:var(--color-primary);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:28px;font-weight:900;color:white;letter-spacing:-2px">KIB</div>
      <h1>Operations Portal</h1>
      <p>Kuwait International Bank — Internal Use Only</p>
    </div>

    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="userSelect">Your Name</label>
        <select id="userSelect" name="user_id" required>
          <option value="">— Select your name —</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pinInput">4-Digit PIN</label>
        <input type="password" id="pinInput" name="pin"
               maxlength="4" inputmode="numeric"
               placeholder="Enter PIN" required autocomplete="off">
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader hidden">Signing in...</span>
      </button>

      <div class="form-error hidden" id="loginError"></div>
    </form>

    <p style="text-align:center;margin-top:24px;font-size:11px;color:var(--text-muted)">
      Forgot your PIN? Contact your manager.
    </p>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script>
    // Minimal API and AUTH for login page (no session required)
    const API = { post: async (path, body) => {
      const res = await fetch(CONFIG.n8n_base_url + path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await res.json();
      if (!data.success) throw new Error(data.error?.message || 'Error');
      return data.data;
    }};
    const AUTH = {
      getSession: () => { try { const s = JSON.parse(localStorage.getItem(CONFIG.session_key)); return s && new Date(s.expires_at) > new Date() ? s : null; } catch { return null; } },
      login: async (userId, pin) => { const d = await API.post('/api/user/bootstrap', { user_id: userId, pin }); if (d) localStorage.setItem(CONFIG.session_key, JSON.stringify(d)); return d; },
    };
  </script>
  <script src="/assets/js/login.js"></script>
</body>
</html>
